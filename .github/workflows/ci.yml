name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    # ← ADD THIS ENV BLOCK
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ vars.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ vars.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Biome check (fix)
        run: pnpm check:fix

      - name: Tests with coverage (CI)
        run: pnpm test:ci

      - name: Coverage summary
        if: success()
        run: |
          node <<'NODE'
          const fs = require("node:fs");
          const summaryPath = "coverage/coverage-summary.json";
          if (!fs.existsSync(summaryPath)) {
            console.error("Missing coverage summary");
            process.exit(1);
          }
          const data = JSON.parse(fs.readFileSync(summaryPath, "utf8"));
          const t = data.total;
          console.log("--- Coverage totals ---");
          console.log(
            `statements ${t.statements.pct}% (min 90%) | branches ${t.branches.pct}% (min 90%) | lines ${t.lines.pct}% (min 90%) | functions ${t.functions.pct}% (min 90%)`
          );
          NODE

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage/

      - name: Build
        run: pnpm build
